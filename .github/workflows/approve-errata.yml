name: Approve errata issue

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number with structured article edit diff
        required: true
        type: string

permissions:
  contents: write
  issues: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply structured errata
        id: apply
        run: python3 scripts/apply_errata_issue.py
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- data/articles_with_urls.json web/src/data/articles.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit approved errata
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "sss-bibliografia-admin"
          git config user.email "actions@github.com"
          git add data/articles_with_urls.json web/src/data/articles.json
          git commit -m "Apply errata issue #${{ inputs.issue_number }}"
          git push

      - name: Close issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
          CHANGED: ${{ steps.diff.outputs.changed }}
          ARTICLE_ID: ${{ steps.apply.outputs.article_id }}
          CHANGED_FIELDS: ${{ steps.apply.outputs.changed_fields }}
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          COMMIT_URL="https://github.com/${REPOSITORY}/commit/${COMMIT_SHA}"
          if [ "$CHANGED" = "true" ]; then
            BODY="Admin schválil opravu cez webové rozhranie a zapísal ju commitom ${COMMIT_URL}.

          - Článok: #${ARTICLE_ID}
          - Polia: ${CHANGED_FIELDS}"
          else
            BODY="Admin schválil opravu cez webové rozhranie. Dáta už zodpovedali navrhovanej hodnote, nový commit nebol potrebný.

          - Článok: #${ARTICLE_ID}
          - Polia: ${CHANGED_FIELDS}"
          fi
          gh issue close "$ISSUE_NUMBER" --repo "$REPOSITORY" --reason completed --comment "$BODY"
